<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ginko Captcha Solver</title>
    <!-- Credits to hCaptcha (https://www.hcaptcha.com) for captcha service -->
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #2c2f33; color: white; padding: 20px; }
        .container { background: #23272a; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); width: 100%; max-width: 500px; text-align: center; border: 1px solid #444; }
        h2 { margin-top: 0; color: #fff; }
        #status { font-weight: bold; margin-bottom: 20px; font-size: 1.2rem; }
        button.main { padding: 14px 24px; border-radius: 4px; border: none; background: #5865f2; color: white; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; margin-top: 10px; }
        button.main:disabled { background: #4f545c; cursor: not-allowed; opacity: 0.5; }
        #h-captcha-container { margin-top: 20px; min-height: 80px; display: flex; justify-content: center; }
        #token-display { word-break: break-all; margin-top: 20px; font-size: 0.8rem; background: #2f3136; padding: 15px; border-radius: 4px; display: none; border: 1px solid #5865f2; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Ginko Captcha Solver</h2>
        <div id="status">Connecting to bot...</div>

        <button id="solve-btn" class="main" onclick="loadCaptcha()" disabled>Solve Captcha</button>
        
        <div id="h-captcha-container"></div>
        
        <div id="token-display">
            <b style="color: #3ba55c">✓ Token Submitted!</b>
        </div>
    </div>

    <script>
        let lastSessionId = null;

        async function poll() {
            try {
                const res = await fetch('/data');
                const data = await res.json();

                if (data && data.captcha_sitekey) {
                    const sessionId = data.captcha_session_id || JSON.stringify(data);
                    if (sessionId !== lastSessionId) {
                        lastSessionId = sessionId;
                        window.CAPTCHA_DATA = data;
                        document.getElementById('status').innerText = 'Challenge Detected!';
                        document.getElementById('status').style.color = '#3ba55c';
                        document.getElementById('solve-btn').disabled = false;
                    }
                } else {
                    document.getElementById('status').innerText = 'No Active Challenge';
                    document.getElementById('status').style.color = '#b9bbbe';
                    document.getElementById('solve-btn').disabled = true;
                    document.getElementById('h-captcha-container').innerHTML = '';
                    document.getElementById('token-display').style.display = 'none';
                }
            } catch (e) {
                document.getElementById('status').innerText = 'Bot Offline';
                document.getElementById('status').style.color = '#f04747';
            }
        }

        function loadCaptcha() {
            const data = window.CAPTCHA_DATA;
            const container = document.getElementById('h-captcha-container');
            container.innerHTML = '';
            
            hcaptcha.render(container, {
                sitekey: data.sitekey || data.captcha_sitekey,
                rqdata: data.rqdata || data.captcha_rqdata,
                callback: onSolved,
                theme: 'dark'
            });
        }

        async function onSolved(token) {
            document.getElementById('token-display').style.display = 'block';
            await fetch(`/submit?token=${encodeURIComponent(token)}`);
        }

        setInterval(poll, 2000);
        poll();
    </script>
</body>
</html>
